[package]
name = "banish"
version = "1.3.0"
edition = "2024"
description = "A declarative DSL for building rule-based state machines."
license = "MIT OR Apache-2.0"
repository = "https://github.com/LoganFlaherty/banish"
readme = "README.md"
keywords = ["state-machine", "dsl", "declarative", "proc-macro", "automata"]

[dependencies]
banish_derive = {path="../banish_derive"}
log = "0.4.29"

[dependencies.env_logger]
version = "0.11.9"
optional = true

[features]
trace-logger = ["env_logger"]